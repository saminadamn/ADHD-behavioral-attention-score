services:
  - type: web
    name: adhd-bas-api
    runtime: python
    buildCommand: pip install --prefer-binary -r requirements.txt && python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://your-vercel-app.vercel.app
      - key: LOG_LEVEL
        value: INFO
      - key: DATA_PATH
        value: ./data/synthetic_adhd.csv
      - key: TRANSFORMERS_CACHE
        value: /opt/render/.cache/huggingface
    disk:
      name: model-cache
      mountPath: /opt/render/.cache
      sizeGB: 1
